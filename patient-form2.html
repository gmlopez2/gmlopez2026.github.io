<!--
Program name: patient-form2.html
Author: Gabriel Lopez
Date created: 3/24/2026
Date last edited: 3/27/2026
Version: 1.2
Description: Cross Physical Therapy Patient Registration Form where you are filling out information for the company to better suit your needs

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Patient Registration — Cross Physical Therapy</title>
  <link rel="stylesheet" href="styles2.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <img src="logo.png" alt="Clinic logo" class="logo">
      <h1>Patient Registration</h1>
      <p class="small">Today is <span id="today"></span></p>
    </header>

    <form id="regForm" novalidate>
      <section class="card">
        <h2>1 — Name & Dates</h2>
        <label>First Name
          <input id="firstName" name="firstName" type="text" required maxlength="30" pattern="^[A-Za-z'\-]{1,30}$">
        </label>
        <div class="error" id="firstNameErr"></div>

        <label>Middle Initial
          <input id="middleInitial" name="middleInitial" type="text" maxlength="1" pattern="^[A-Za-z]?$">
        </label>
        <div class="error" id="middleInitialErr"></div>

        <label>Last Name
          <input id="lastName" name="lastName" type="text" required maxlength="30" pattern="^[A-Za-z0-9'\-]{1,30}$">
        </label>
        <div class="error" id="lastNameErr"></div>

        <label>Birthday
          <input id="birthday" name="birthday" type="date" required>
        </label>
        <div class="error" id="birthdayErr"></div>

        <label>Move‑in / Travel Date
          <input id="moveDate" name="moveDate" type="date">
        </label>
        <div class="error" id="moveDateErr"></div>

        <label>ID / SSN (optional, masked)
          <input id="idNumber" name="idNumber" type="password" maxlength="30" autocomplete="new-password">
        </label>
        <div class="error" id="idNumberErr"></div>
      </section>

      <section class="card">
        <h2>2 — Contact</h2>
        <label>Email
          <input id="email" name="email" type="email" required>
        </label>
        <div class="error" id="emailErr"></div>

        <label>Phone (000-000-0000)
          <input id="phone" name="phone" type="tel" pattern="^\d{3}-\d{3}-\d{4}$" placeholder="555-555-1212">
        </label>
        <div class="error" id="phoneErr"></div>
      </section>
<!-- ADDRESS  -->
      <section class="card">
        <h2>3 — Address</h2>
        <label>Address Line 1
          <input id="addr1" name="addr1" type="text" required minlength="2" maxlength="30">
        </label>
        <div class="error" id="addr1Err"></div>

        <label>Address Line 2
          <input id="addr2" name="addr2" type="text" minlength="2" maxlength="30">
        </label>
        <div class="error" id="addr2Err"></div>

        <label>City
          <input id="city" name="city" type="text" required minlength="2" maxlength="30">
        </label>
        <div class="error" id="cityErr"></div>
<!-- STATE -->
        <label>State
          <select id="state" name="state" required>
            <option value="">-- select state --</option>
            <option value="AL">AL</option>
            <option value="AK">AK</option>
            <option value="AZ">AZ</option>
            <option value="AR">AR</option>
            <option value="CA">CA</option>
            <option value="CO">CO</option>
            <option value="CT">CT</option>
            <option value="DE">DE</option>
            <option value="FL">FL</option>
            <option value="GA">GA</option>
            <option value="HI">HI</option>
            <option value="ID">ID</option>
            <option value="IL">IL</option>
            <option value="IN">IN</option>
            <option value="IA">IA</option>
            <option value="KS">KS</option>
            <option value="KY">KY</option>
            <option value="LA">LA</option>
            <option value="ME">ME</option>
            <option value="MD">MD</option>
            <option value="MA">MA</option>
            <option value="MI">MI</option>
            <option value="MN">MN</option>
            <option value="MS">MS</option>
            <option value="MO">MO</option>
            <option value="MT">MT</option>
            <option value="NE">NE</option>
            <option value="NV">NV</option>
            <option value="NH">NH</option>
            <option value="NJ">NJ</option>
            <option value="NM">NM</option>
            <option value="NY">NY</option>
            <option value="NC">NC</option>
            <option value="ND">ND</option>
            <option value="OH">OH</option>
            <option value="OK">OK</option>
            <option value="OR">OR</option>
            <option value="PA">PA</option>
            <option value="RI">RI</option>
            <option value="SC">SC</option>
            <option value="SD">SD</option>
            <option value="TN">TN</option>
            <option value="TX">TX</option>
            <option value="UT">UT</option>
            <option value="VT">VT</option>
            <option value="VA">VA</option>
            <option value="WA">WA</option>
            <option value="WV">WV</option>
            <option value="WI">WI</option>
            <option value="WY">WY</option>
            <option value="DC">DC</option>
            <option value="PR">PR</option>
          </select>
        </label>
        <div class="error" id="stateErr"></div>

        <label>Zip
          <input id="zip" name="zip" type="text" required pattern="^\d{5}(-\d{4})?$">
        </label>
        <div class="error" id="zipErr"></div>
      </section>

      <section class="card">
        <h2>4 — Choices</h2>
        <div class="group">
          <p>Medical history (check all that apply)</p>
          <label><input type="checkbox" name="history" value="chickenpox"> Chicken Pox</label>
          <label><input type="checkbox" name="history" value="measles"> Measles</label>
          <label><input type="checkbox" name="history" value="covid"> COVID‑19</label>
          <label><input type="checkbox" name="history" value="other"> Other</label>
        </div>

        <div class="group">
          <p>Housing</p>
          <label><input type="radio" name="housing" value="own" required> Own</label>
          <label><input type="radio" name="housing" value="rent"> Rent</label>
          <label><input type="radio" name="housing" value="unsure"> Unsure</label>
        </div>

        <div class="group">
          <p>Vaccinated?</p>
          <label><input type="radio" name="vaccinated" value="yes" required> Yes</label>
          <label><input type="radio" name="vaccinated" value="no"> No</label>
          <label><input type="radio" name="vaccinated" value="preferNot"> Prefer not to say</label>
        </div>

        <div class="group">
          <p>Desired salary / price range</p>
          <input id="salary" name="salary" type="range" min="20000" max="200000" step="1000" value="50000">
          <span id="salaryDisplay">$50,000</span>
        </div>
      </section>

      <section class="card">
        <h2>Additional & Credentials</h2>
        <label>Notes (optional — double quotes not allowed)
          <textarea id="notes" name="notes" rows="4" pattern="^[^\"]*$"></textarea>
        </label>
        <div class="error" id="notesErr"></div>

        <label>Desired User ID
          <input id="userId" name="userId" type="text" required minlength="5" maxlength="30" pattern="^[A-Za-z][A-Za-z0-9_-]{4,29}$">
        </label>
        <div class="error" id="userIdErr"></div>

        <label>Password
          <input id="password" name="password" type="password" required minlength="8" maxlength="30" autocomplete="new-password">
        </label>
        <div class="error" id="passwordErr"></div>
